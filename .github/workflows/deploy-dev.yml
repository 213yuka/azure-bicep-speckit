# =============================================================================
# dev 環境への自動デプロイ（main マージ トリガー）
# =============================================================================
name: deploy-dev

on:
  push:
    branches: [main]
    paths:
      - 'infra/**'

permissions:
  id-token: write
  contents: read

concurrency:
  group: deploy-dev
  cancel-in-progress: false

jobs:
  deploy:
    name: dev 環境デプロイ
    runs-on: ubuntu-latest
    environment: dev
    steps:
      - name: チェックアウト
        uses: actions/checkout@v4

      - name: Azure ログイン (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: 機密情報のマスク設定
        run: |
          echo "MASK_SUB=${{ secrets.AZURE_SUBSCRIPTION_ID }}" >> $GITHUB_ENV
          echo "MASK_TENANT=${{ secrets.AZURE_TENANT_ID }}" >> $GITHUB_ENV
          echo "MASK_CLIENT=${{ secrets.AZURE_CLIENT_ID }}" >> $GITHUB_ENV
          echo "::add-mask::${{ secrets.AZURE_SUBSCRIPTION_ID }}"
          echo "::add-mask::${{ secrets.AZURE_TENANT_ID }}"
          echo "::add-mask::${{ secrets.AZURE_CLIENT_ID }}"

      - name: Bicep ビルド（構文チェック）
        run: az bicep build --file infra/main.bicep

      - name: dev 環境へデプロイ
        id: deploy
        run: |
          DEPLOY_NAME="dev-$(date +%Y%m%d-%H%M%S)"
          echo "deployment_name=$DEPLOY_NAME" >> $GITHUB_OUTPUT

          az deployment sub create \
            --location japaneast \
            --template-file infra/main.bicep \
            --parameters infra/parameters/dev.bicepparam \
            --name "$DEPLOY_NAME" \
            --query "{name:name, provisioningState:properties.provisioningState}" \
            -o json

      - name: デプロイ結果サマリー
        if: always()
        run: |
          echo "## dev 環境デプロイ結果" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| 項目 | 値 |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| デプロイ名 | \`${{ steps.deploy.outputs.deployment_name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| 環境 | dev |" >> $GITHUB_STEP_SUMMARY
          echo "| リージョン | japaneast |" >> $GITHUB_STEP_SUMMARY
          echo "| コミット | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| ステータス | ${{ job.status }} |" >> $GITHUB_STEP_SUMMARY
