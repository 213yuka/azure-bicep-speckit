# =============================================================================
# Bicep バリデーション & What-If 分析（PR トリガー）
# =============================================================================
name: validate

on:
  pull_request:
    branches: [main]
    paths:
      - 'infra/**'

permissions:
  id-token: write
  contents: read
  pull-requests: write

jobs:
  validate:
    name: Bicep バリデーション & What-If
    runs-on: ubuntu-latest
    steps:
      - name: チェックアウト
        uses: actions/checkout@v4

      - name: Azure ログイン (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: 機密情報のマスク設定
        id: mask
        run: |
          # sed用に環境変数へ保存（add-maskの前に行う）
          echo "MASK_SUB=${{ secrets.AZURE_SUBSCRIPTION_ID }}" >> $GITHUB_ENV
          echo "MASK_TENANT=${{ secrets.AZURE_TENANT_ID }}" >> $GITHUB_ENV
          echo "MASK_CLIENT=${{ secrets.AZURE_CLIENT_ID }}" >> $GITHUB_ENV
          # ログ出力をマスク
          echo "::add-mask::${{ secrets.AZURE_SUBSCRIPTION_ID }}"
          echo "::add-mask::${{ secrets.AZURE_TENANT_ID }}"
          echo "::add-mask::${{ secrets.AZURE_CLIENT_ID }}"

      - name: Bicep ビルド（構文チェック）
        run: az bicep build --file infra/main.bicep

      - name: What-If 分析 (dev)
        id: whatif
        run: |
          set +e
          RESULT=$(az deployment sub what-if \
            --location japaneast \
            --template-file infra/main.bicep \
            --parameters infra/parameters/dev.bicepparam \
            --no-pretty-print 2>&1)
          EXIT_CODE=$?
          echo "exit_code=$EXIT_CODE" >> $GITHUB_OUTPUT

          # 環境変数を使ってサブスクリプションID等をマスク
          MASKED_RESULT=$(echo "$RESULT" \
            | sed "s/${MASK_SUB}/***SUBSCRIPTION***/g" \
            | sed "s/${MASK_TENANT}/***TENANT***/g" \
            | sed "s/${MASK_CLIENT}/***CLIENT***/g" \
            | head -c 60000)
          {
            echo "result<<EOF_WHATIF"
            echo "$MASKED_RESULT"
            echo "EOF_WHATIF"
          } >> $GITHUB_OUTPUT

          exit $EXIT_CODE

      - name: PR にコメント投稿
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const exitCode = '${{ steps.whatif.outputs.exit_code }}';
            const result = `${{ steps.whatif.outputs.result }}`;
            const status = exitCode === '0' ? '✅ 成功' : '❌ 失敗';

            const body = `## Bicep What-If 分析結果 ${status}

            <details>
            <summary>What-If 出力を表示</summary>

            \`\`\`
            ${result || 'What-If の出力を取得できませんでした'}
            \`\`\`

            </details>

            ---
            *自動生成: \`validate\` ワークフロー*`;

            // 既存のコメントを検索して更新 or 新規作成
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const botComment = comments.find(c =>
              c.body.includes('Bicep What-If 分析結果')
            );

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
